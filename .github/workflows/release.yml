name: Release

on:
  push:
    # The `v` prefix is a convention, not a SemVer requirement — accept both `v1.2.3` and bare
    # `1.2.3` tags. `Derive version from tag` strips a leading `v` only when present.
    tags:
      - 'v*.*.*'
      - '[0-9]*.*.*'

permissions:
  contents: write
  # Build-provenance attestation (actions/attest-build-provenance) needs these two.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    env:
      REPO_URL: https://github.com/djwinston/wikeloContractor
    steps:
      - uses: actions/checkout@v4
        with:
          # Velopack needs prior releases' history to build delta packages.
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME          # e.g. v1.2.3
          $version = $tag.TrimStart('v')       # e.g. 1.2.3
          "TAG=$tag"         | Out-File -FilePath $env:GITHUB_ENV -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          if ($tag -match '-') { "PRERELEASE=true" | Out-File -FilePath $env:GITHUB_ENV -Append }

      - name: Test
        run: dotnet test tests/WikeloContractor.Tests.csproj -c Release

      - name: Publish (framework-dependent)
        run: dotnet publish src/WikeloContractor.csproj -c Release -r win-x64 --self-contained false -p:Version=$env:VERSION -o publish

      - name: Install Velopack CLI
        # Pinned to the Velopack library version in src/WikeloContractor.csproj — vpk warns and can
        # misbehave when the two drift apart. Bump both together, never just one.
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Download prior releases (for deltas)
        continue-on-error: true
        shell: pwsh
        run: vpk download github --repoUrl $env:REPO_URL

      - name: Pack installer
        shell: pwsh
        env:
          # Optional signing — dormant until these repository secrets are added.
          SIGN_PFX_BASE64: ${{ secrets.SIGN_PFX_BASE64 }}
          SIGN_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
        run: |
          $vpkArgs = @(
            'pack',
            '--packId', 'WikeloContractor',
            '--packTitle', 'Wikelo Contractor',
            '--packVersion', $env:VERSION,
            '--packDir', 'publish',
            '--mainExe', 'WikeloContractor.exe',
            '--icon', 'src/Assets/app.ico',
            # Makes the installer bootstrap the .NET 10 Desktop Runtime if it is missing.
            '--framework', 'net10.0-x64-desktop'
            # NOTE: portable-only until the app is code-signed. An unsigned Setup.exe/.msi is a
            # self-extracting installer that hardened machines (Smart App Control / ASR) hard-block,
            # and auto-update is a no-op while unsigned anyway — so we publish only the portable zip
            # (see the "Remove installer assets" step below). To re-enable the installers once signing
            # lands: add back '--msi', '--instLocation', 'Either' here, drop that step, and restore the
            # installer patterns in the checksum/attestation steps.
          )
          if ($env:SIGN_PFX_BASE64) {
            [System.IO.File]::WriteAllBytes('cert.pfx', [System.Convert]::FromBase64String($env:SIGN_PFX_BASE64))
            $vpkArgs += @('--signParams', "/f cert.pfx /p $env:SIGN_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256")
          }
          vpk @vpkArgs

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $uploadArgs = @(
            'upload', 'github',
            '--repoUrl', $env:REPO_URL,
            '--publish',
            '--releaseName', $env:TAG,
            '--tag', $env:TAG,
            '--token', $env:GITHUB_TOKEN
          )
          if ($env:PRERELEASE -eq 'true') { $uploadArgs += '--pre' }
          vpk @uploadArgs

      - name: Remove installer assets (portable-only until signed)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # vpk always emits and uploads Setup.exe; unpublish it (and any .msi) so the release offers
          # only the portable zip while the build is unsigned. The Velopack update metadata
          # (*.nupkg / RELEASES) is left in place — harmless with no installer, and it keeps vpk's
          # delta-download working when installers are re-enabled after signing.
          $assets = gh release view $env:TAG --json assets --jq '.assets[].name'
          foreach ($name in $assets) {
            if ($name -like '*Setup.exe' -or $name -like '*.msi') {
              gh release delete-asset $env:TAG $name --yes
            }
          }

      - name: Fill release notes from commit messages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # vpk creates the release but leaves the body empty. GitHub's generate-notes API is
          # deliberately not used: it lists merged *pull requests*, so a PR carrying three commits
          # collapses to a single line and every commit body is lost. This builds the changelog
          # from the commits themselves, subject as a heading and the full body underneath.
          $prev = git describe --tags --abbrev=0 "$env:TAG^" 2>$null
          $range = if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($prev)) { $env:TAG } else { "$prev..$env:TAG" }

          $recSep = [char]0x1e
          $fldSep = [char]0x1f
          # --no-merges: a merge commit only repeats the PR title its branch commits already carry.
          $raw = (git log --no-merges --reverse --pretty=format:"%s$fldSep%b$recSep" $range) -join "`n"

          $out = [System.Collections.Generic.List[string]]::new()
          $out.Add('## What''s Changed')
          $out.Add('')

          foreach ($rec in ($raw -split $recSep)) {
            if ([string]::IsNullOrWhiteSpace($rec)) { continue }
            $parts = $rec -split $fldSep, 2
            $subject = $parts[0].Trim()
            if (-not $subject) { continue }

            $out.Add("### $subject")
            $out.Add('')

            if ($parts.Count -gt 1) {
              $body = $parts[1] -split "`r?`n" | Where-Object {
                $_ -notmatch '^\s*Co-[Aa]uthored-[Bb]y:' -and $_ -notmatch 'Generated with \[Claude Code\]'
              }
              # Trim blank lines around the block (Trim keeps interior blanks); skip an empty body.
              $text = ($body -join "`n").Trim()
              if ($text) {
                $out.Add($text)
                $out.Add('')
              }
            }
          }

          Set-Content -Path notes.md -Value ($out -join "`n") -Encoding utf8
          gh release edit $env:TAG --notes-file notes.md

      - name: Publish SHA256 checksums
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull the just-published portable zip back down and checksum it, so users can verify a
          # download while the build is not yet code-signed. Operating on the published asset (not
          # vpk's local output dir) keeps this independent of vpk's layout.
          New-Item -ItemType Directory -Force dist | Out-Null
          gh release download $env:TAG -D dist --pattern '*.zip'
          $sums = Get-ChildItem dist -File | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name
          }
          Set-Content -Path SHA256SUMS.txt -Value $sums -Encoding ascii
          gh release upload $env:TAG SHA256SUMS.txt --clobber

      - name: Attest build provenance
        # Records that these artifacts were built by this workflow from this repo. Verifiable with
        # `gh attestation verify <file> --repo <repo>`; strengthens a future SignPath Foundation
        # application and lets users verify the portable build before it is code-signed.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.zip
