name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  # The ruleset "Required status checks" entries reference this job name verbatim — keep it stable.
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build src/WikeloContractor.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/WikeloContractor.Tests.csproj -c Release
